name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']   # убрал 3.9

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov   # <--- добавлено

      - name: Run tests
        env:
          ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
          VERSION: "ci-test"
          PYTHONPATH: .
        run: |
          pytest test/ -v --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Generate test badge
        run: |
          pip install anybadge
          total=$(pytest --collect-only -q --disable-warnings | grep -c "test_")
          passed=$(pytest -q --disable-warnings | grep -oP '\d+(?= passed)' | tail -1)
          anybadge -l "tests" -v "$passed/$total" -f tests.svg

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/

      - name: Generate coverage badge
        run: |
          # Установить утилиту для создания бейджей (или использовать Python)
          pip install anybadge
          # Извлечь процент покрытия из coverage.xml
          PERCENT=$(python -c "import xml.etree.ElementTree as ET; print(f\"{float(ET.parse('coverage.xml').getroot().attrib['line-rate'])*100:.2f}\")")
          # Создать бейдж
          anybadge -l coverage -v "$PERCENT%" -f coverage.svg -c green

      - name: Deploy badge to 'badges' branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin badges || true
          git checkout -B badges origin/badges 2>/dev/null || git checkout -b badges
          # копирование не нужно — файл уже здесь
          git add coverage.svg tests.svg
          git commit -m "Update coverage badge [skip ci]" || echo "No changes to commit"
          git push origin badges --force
