name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov pytest-json-report anybadge

      - name: Run tests
        env:
          ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
          VERSION: "ci-test"
          PYTHONPATH: .
        run: |
          python -m pytest test/ -v --cov=src --cov-report=term-missing --cov-report=xml --cov-report=html

      - name: Generate test badge
        if: matrix.python-version == '3.10'   # <-- добавить
        env:
          PYTHONPATH: .
          ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
          VERSION: "ci-test"
        run: |
          # Получаем общее количество тестов через json-report
          python -m pytest --collect-only -q --disable-warnings --json-report --json-report-file=total.json
          total=$(python -c "import json; print(len(json.load(open('total.json'))['tests']))")
          # Запускаем тесты для получения количества пройденных
          python -m pytest -q --disable-warnings --json-report --json-report-file=results.json
          passed=$(python -c "import json; data=json.load(open('results.json')); print(sum(1 for t in data['tests'] if t['outcome'] == 'passed'))")
          anybadge -l "tests" -v "$passed/$total" -f tests.svg

      - name: Generate coverage badge
        if: matrix.python-version == '3.10'   # <-- добавить
        run: |
          PERCENT=$(python -c "import xml.etree.ElementTree as ET; print(f\"{float(ET.parse('coverage.xml').getroot().attrib['line-rate'])*100:.2f}\")")
          anybadge -l coverage -v "$PERCENT%" -f coverage.svg -c green

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ matrix.python-version }}
          path: htmlcov/

      - name: Deploy badge to 'badges' branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git fetch origin badges || true
          git checkout -B badges origin/badges 2>/dev/null || git checkout -b badges
          git add coverage.svg tests.svg
          git commit -m "Update coverage and test badges [skip ci]" || echo "No changes to commit"
          git push --force origin badges
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/health > /dev/null; then
              echo "API is ready"
              break
            fi
            echo "Waiting for API... (attempt $i/30)"
            sleep 2
          done

      - name: Health check
        run: |
          curl --fail http://localhost:8000/health

      - name: Show logs if failed
        if: failure()
        run: docker compose logs

      - name: Stop services
        if: always()
        run: docker compose down
  load-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s -f http://localhost:8000/health; then
              echo "API ready"
              break
            fi
            echo "Waiting... $i/30"
            sleep 2
          done

      - name: Run Locust headless via Docker
        run: |
          docker compose run --rm locust \
            -f /mnt/locust/locustfile.py --host http://api:8000 \
            --users 50 --spawn-rate 5 --run-time 1m \
            --headless --html /mnt/locust/report.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: locust-report
          path: report.html

      - name: Stop containers
        if: always()
        run: docker compose down
