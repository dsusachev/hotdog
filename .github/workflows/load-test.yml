name: Load Test (Locust)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir locust==2.20.0 gevent==23.9.1 zope.event==5.0

      - name: Start services with docker compose
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -s -f http://localhost:8000/health && break || sleep 2
          done

      - name: Run Locust (headless, 1 minute)
        run: |
          locust -f locustfile.py --host http://localhost:8000 \
            --users 50 --spawn-rate 5 --run-time 1m \
            --headless --html report.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: report.html

      - name: Stop containers
        if: always()
        run: docker compose down
