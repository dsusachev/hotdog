name: Load Test (Locust)

on:
  schedule:
    - cron: '0 3 * * *'   # каждый день в 3:00 UTC
  workflow_dispatch:       # кнопка для ручного запуска

jobs:
  locust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust

      - name: Start services with docker compose
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -s -f http://localhost:8000/health && break || sleep 2
          done

      - name: Run Locust (headless)
        run: |
          locust -f locustfile.py --host http://localhost:8000 \
            --users 100 --spawn-rate 10 --run-time 2m \
            --headless --html report.html

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: report.html

      - name: Stop containers
        if: always()
        run: docker compose down
