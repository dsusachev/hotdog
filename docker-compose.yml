services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: hotdog
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d hotdog"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_USER: user
      DB_PASSWORD: pass
      DB_NAME: hotdog
      DB_PORT: 5432
      SECRET_KEY: "ci-secret-key-not-for-production"
      ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
      VERSION: "ci-test"
    depends_on:
      db:
        condition: service_healthy

  locust:
    image: locustio/locust:latest
    profiles: ["load-test"]          # <-- не поднимается при обычном up
    volumes:
      - ./:/mnt/locust
    depends_on:
      - api
